<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKSA - Arsip Raksasa</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#B88E2F',
                        dark: '#121212',
                        darker: '#0a0a0a'
                    }
                }
            }
        }
    </script>
    <style>
        /* Sedikit custom CSS untuk animasi transisi halaman */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-dark dark:text-gray-200 transition-colors duration-300 font-sans flex flex-col min-h-screen">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-darker/80 backdrop-blur-md shadow-sm transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="#" data-link="blog" class="nav-brand text-2xl font-bold text-primary tracking-tight">AKSA</a>
                
                <div class="hidden md:flex items-center space-x-8">
                    <button data-link="blog" class="nav-item font-medium hover:text-primary transition-colors">Blog</button>
                    <button data-link="portfolio" class="nav-item font-medium hover:text-primary transition-colors">Portfolio</button>
                    <button data-link="about" class="nav-item font-medium hover:text-primary transition-colors">Tentang</button>
                    <button data-link="contact" class="nav-item font-medium hover:text-primary transition-colors">Kontak</button>
                    <button id="darkModeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>

                <div class="md:hidden flex items-center">
                    <button id="mobileMenuBtn" class="text-2xl p-2 focus:outline-none">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="mobileMenu" class="hidden md:hidden bg-white dark:bg-darker border-t dark:border-gray-800 absolute w-full left-0 shadow-lg">
            <div class="px-4 pt-2 pb-6 space-y-2 flex flex-col items-center">
                <button data-link="blog" class="nav-item block px-3 py-2 text-base font-medium hover:text-primary">Blog</button>
                <button data-link="portfolio" class="nav-item block px-3 py-2 text-base font-medium hover:text-primary">Portfolio</button>
                <button data-link="about" class="nav-item block px-3 py-2 text-base font-medium hover:text-primary">Tentang</button>
                <button data-link="contact" class="nav-item block px-3 py-2 text-base font-medium hover:text-primary">Kontak</button>
                <button id="darkModeToggleMobile" class="mt-4 p-2 rounded-full bg-gray-100 dark:bg-gray-800 w-12 h-12 flex items-center justify-center">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main id="app" class="flex-grow w-full max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10 fade-in">
        </main>

    <footer class="bg-white dark:bg-darker border-t dark:border-gray-800 mt-auto transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4 py-8 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-gray-500 dark:text-gray-400 text-sm">&copy; 2026 AKSA (Arsip Raksasa). All rights reserved.</p>
            <div class="flex space-x-6">
                <a href="#" class="text-gray-400 hover:text-primary transition-colors"><i class="fab fa-twitter text-xl"></i></a>
                <a href="https://www.instagram.com/ferrdxd_" class="text-gray-400 hover:text-primary transition-colors"><i class="fab fa-instagram text-xl"></i></a>
                <a href="#" class="text-gray-400 hover:text-primary transition-colors"><i class="fab fa-github text-xl"></i></a>
                <a href="#" class="text-gray-400 hover:text-primary transition-colors"><i class="fab fa-linkedin-in text-xl"></i></a>
            </div>
        </div>
    </footer>

    <div id="modalContainer" class="fixed inset-0 z-[100] hidden bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        </div>

    <script src="js/app.js"></script>
</body>
</html>
