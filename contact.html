<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak - AKSA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
</head>
<body>
    <nav class="navbar"> <!-- Sama seperti sebelumnya, sesuaikan active class -->
        <div class="container nav-container">
            <a href="index.html" class="logo">AKSA</a>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Blog</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="about.html">Tentang</a></li>
                <li><a href="contact.html" class="active">Kontak</a></li>
                <li>
                    <button id="darkModeToggle" class="dark-mode-btn">
                        <i class="fas fa-moon"></i>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1>Hubungi Saya</h1>
            <p>Ada pertanyaan atau mau ngobrol? Kirim pesan saja!</p>
        </div>
    </header>

    <main class="container contact-page">
        <div class="contact-grid">
            <div class="contact-info">
                <h2>Informasi Kontak</h2>
                <ul>
                    <li><i class="fas fa-envelope"></i> maulanaferdi0678@gmail.com</li>
                    <li><i class="fas fa-phone-alt"></i> +62 822-9923-4269</li>
                    <li><i class="fas fa-map-marker-alt"></i> Bogor, Indonesia</li>
                </ul>
                <div class="social-links-large">
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="https://www.instagram.com/ferrdxd_"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-github"></i></a>
                </div>
            </div>
            <div class="contact-form-container">
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Nama</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Pesan</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Kirim Pesan</button>
                    <div id="formStatus" class="form-status"></div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer"> <!-- Sama seperti sebelumnya --> </footer>
    <script src="js/script.js"></script>
</body>
</html>
